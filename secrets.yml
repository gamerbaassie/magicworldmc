name: Vervang Secrets in HTML

on:
  push:
    branches:
      - main  # Verander dit naar 'master' als jouw hoofdbranch zo heet

jobs:
  replace-secrets:
    runs-on: ubuntu-latest
    steps:
      # Stap 1: Haal de bestanden op uit je repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Stap 2: Vervang de placeholder in alle HTML-bestanden in de hoofdmap
      - name: Vervang de API-code in alle HTML-pagina's
        run: |
          sed -i 's/STAFF_CODE_PLACEHOLDER/${{ secrets.STAFF_CODE }}/g' *.html

      # Stap 3: Sla de wijzigingen tijdelijk op voor de volgende stap
      # (Optioneel: hieronder kun je later je deploy-stappen toevoegen)
