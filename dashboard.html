<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagicWorldMC | Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars-bg"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">✨ MagicWorldMC</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <div class="nav-links" id="menu">
    <a href="index.html">← Terug naar site</a>
    <span id="nav-user" style="color: var(--text-dim); font-size:12px; padding: 6px 10px;"></span>
    <button onclick="doLogout()" class="btn btn-outline" style="padding: 6px 16px; font-size:12px; cursor:pointer;">Uitloggen</button>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="dashboard-wrapper">

  <!-- Header -->
  <div class="dashboard-header">
    <div>
      <div class="dashboard-title">🏰 Staff Dashboard</div>
      <div style="color: var(--text-dim); font-size: 13px; margin-top: 4px;">MagicWorldMC Media Rank aanvragen</div>
    </div>
    <button onclick="loadApplications()" class="btn btn-outline" style="font-size:12px; padding: 8px 18px; cursor:pointer;">
      🔄 Vernieuwen
    </button>
  </div>

  <!-- Stats -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Totaal aanvragen</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-pending" style="color:#fbbf24">—</div>
      <div class="stat-label">In behandeling</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-approved" style="color:#4ade80">—</div>
      <div class="stat-label">Goedgekeurd</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-rejected" style="color:#f87171">—</div>
      <div class="stat-label">Afgewezen</div>
    </div>
  </div>

  <!-- Table -->
  <div class="applications-table-wrap">
    <div class="table-head">
      <h3>📋 Aanvragen</h3>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">Alles</button>
        <button class="filter-tab" onclick="setFilter('pending', this)">In behandeling</button>
        <button class="filter-tab" onclick="setFilter('approved', this)">Goedgekeurd</button>
        <button class="filter-tab" onclick="setFilter('rejected', this)">Afgewezen</button>
      </div>
    </div>

    <div id="applications-list">
      <div class="empty-state">
        <span class="spinner"></span> Aanvragen laden...
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7ncs5g0eZzGtUymIsDaBGaVUoxWL23Mo",
  authDomain: "magicworldmc-de515.firebaseapp.com",
  projectId: "magicworldmc-de515",
  storageBucket: "magicworldmc-de515.firebasestorage.app",
  messagingSenderId: "32771602846",
  appId: "1:32771602846:web:edef1ef87aaabb986dbe8f",
  measurementId: "G-YKS1C9HYZE"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let allApplications = [];
let currentFilter = 'all';

// Auth guard
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  document.getElementById('nav-user').textContent = user.email;
  loadApplications();
});

window.doLogout = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};

window.loadApplications = async function() {
  const list = document.getElementById('applications-list');
  list.innerHTML = '<div class="empty-state"><span class="spinner"></span> Laden...</div>';

  try {
    const q    = query(collection(db, 'media_rank_aanvragen'), orderBy('datum', 'desc'));
    const snap = await getDocs(q);
    allApplications = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderApplications();
  } catch (err) {
    list.innerHTML = `<div class="empty-state">⚠️ Fout bij laden: ${err.message}</div>`;
  }
};

function updateStats() {
  const total    = allApplications.length;
  const pending  = allApplications.filter(a => (a.status || 'pending') === 'pending').length;
  const approved = allApplications.filter(a => a.status === 'approved').length;
  const rejected = allApplications.filter(a => a.status === 'rejected').length;
  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-pending').textContent  = pending;
  document.getElementById('stat-approved').textContent = approved;
  document.getElementById('stat-rejected').textContent = rejected;
}

function renderApplications() {
  const list = document.getElementById('applications-list');
  const data = currentFilter === 'all'
    ? allApplications
    : allApplications.filter(a => (a.status || 'pending') === currentFilter);

  if (!data.length) {
    list.innerHTML = '<div class="empty-state">📭 Geen aanvragen gevonden.</div>';
    return;
  }

  list.innerHTML = data.map(app => {
    const status = app.status || 'pending';
    const badgeClass = { pending: 'badge-pending', approved: 'badge-approved', rejected: 'badge-rejected' }[status];
    const badgeLabel = { pending: '⏳ In behandeling', approved: '✓ Goedgekeurd', rejected: '✗ Afgewezen' }[status];
    const date = app.datum?.toDate ? app.datum.toDate().toLocaleDateString('nl-NL') : (app.datum || '—');

    return `
    <div class="application-row" id="app-${app.id}">
      <div class="app-row-top">
        <div>
          <div class="app-name">${esc(app.naam)}</div>
          <div class="app-mc">🎮 ${esc(app.minecraftnaam)} &nbsp;·&nbsp; Leeftijd: ${esc(app.leeftijd)}</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div class="app-date">${date}</div>
          <span class="badge ${badgeClass}">${badgeLabel}</span>
        </div>
      </div>
      <div class="app-row-meta">
        <div class="app-meta-item">Platform: <span class="app-platform">${esc(app.platform || app.socialmedia || '—')}</span></div>
        <div class="app-meta-item">Kanaal: <span><a href="${esc(app.kanaallink || '#')}" target="_blank" style="color:var(--gold)">${esc(app.kanaallink || '—')}</a></span></div>
      </div>
      ${app.motivatie ? `<div class="app-motivatie">💬 ${esc(app.motivatie)}</div>` : ''}
      <div class="app-actions">
        ${status !== 'approved' ? `<button class="btn-sm btn-approve" onclick="updateStatus('${app.id}', 'approved')">✓ Goedkeuren</button>` : ''}
        ${status !== 'rejected' ? `<button class="btn-sm btn-reject" onclick="updateStatus('${app.id}', 'rejected')">✗ Afwijzen</button>` : ''}
        ${status !== 'pending' ? `<button class="btn-sm" style="border-color:var(--glass-border);color:var(--text-dim);background:transparent;" onclick="updateStatus('${app.id}', 'pending')">↩ Terug naar behandeling</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

window.setFilter = function(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderApplications();
};

window.updateStatus = async function(id, status) {
  try {
    await updateDoc(doc(db, 'media_rank_aanvragen', id), { status });
    const idx = allApplications.findIndex(a => a.id === id);
    if (idx !== -1) allApplications[idx].status = status;
    updateStats();
    renderApplications();
  } catch (err) {
    alert('Fout bij bijwerken: ' + err.message);
  }
};

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

<script>
function toggleMenu() {
  document.getElementById('menu').classList.toggle('active');
}
</script>
</body>
</html>
